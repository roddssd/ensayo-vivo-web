<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<meta name="robots" content="noindex, nofollow" />
<title>Ensayo Vivo</title>
<style>
  /* Tokens espejados de src/theme/index.ts de la app. */
  :root {
    --bg: #0E0E10;
    --surface: #16161B;
    --surface-alt: #242429;
    --primary: #3BA7C4;
    --primary-soft: rgba(59, 167, 196, 0.15);
    --primary-soft-text: #7ECFE3;
    --text: #F2F2F3;
    --muted: #9A9AA2;
    --border: #26262C;
    --success: #46A758;
    --radius-card: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.4;
    padding: 20px 16px 48px;
    max-width: 720px;
    margin-inline: auto;
  }
  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.3px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    padding: 16px;
    margin-bottom: 16px;
  }
  h2 {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--muted); margin: 0 0 12px;
  }
  /* --- Onda + pins --- */
  #wavewrap { position: relative; margin-bottom: 8px; }
  #pins { position: relative; height: 22px; }
  .pin {
    position: absolute; top: 0; transform: translateX(-50%);
    width: 18px; height: 18px; border-radius: 9px;
    background: var(--primary-soft); border: 1px solid var(--primary);
    color: var(--primary-soft-text); font-size: 11px; line-height: 16px;
    text-align: center; cursor: pointer; padding: 0;
  }
  #wave { width: 100%; height: 88px; display: block; cursor: pointer; touch-action: none; }
  .times { display: flex; justify-content: space-between; color: var(--muted); font-size: 13px; }
  /* --- Controles --- */
  .controls { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
  button {
    font: inherit; color: var(--text); background: var(--surface-alt);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; cursor: pointer;
  }
  button:hover { border-color: var(--primary); }
  button.primary { background: var(--primary); color: #04222B; border-color: var(--primary); font-weight: 600; }
  #play { min-width: 96px; }
  /* --- Listas --- */
  ul { list-style: none; margin: 0; padding: 0; }
  li {
    display: flex; gap: 12px; align-items: baseline;
    padding: 10px 8px; border-radius: 8px; cursor: pointer;
  }
  li + li { border-top: 1px solid var(--border); }
  li:hover { background: var(--surface-alt); }
  li.active { background: var(--primary-soft); }
  .stamp { color: var(--primary-soft-text); font-variant-numeric: tabular-nums; font-size: 14px; flex-shrink: 0; }
  .note { flex: 1; }
  .range { color: var(--muted); font-size: 13px; }
  .empty { color: var(--muted); font-size: 14px; }
  #msg { text-align: center; padding: 48px 16px; color: var(--muted); }
  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 32px; }
</style>
</head>
<body>

<div id="msg">Cargando…</div>

<main id="app" hidden>
  <h1 id="title">Ensayo</h1>
  <div class="sub" id="meta"></div>

  <div class="card">
    <div id="wavewrap">
      <div id="pins"></div>
      <canvas id="wave"></canvas>
    </div>
    <div class="times"><span id="cur">0:00</span><span id="dur">0:00</span></div>
    <div class="controls">
      <button id="play" class="primary">▶ Reproducir</button>
      <button id="back">−10 s</button>
      <button id="fwd">+10 s</button>
      <span id="clipnote" class="range"></span>
    </div>
    <audio id="audio" preload="metadata"></audio>
  </div>

  <div class="card" id="notescard">
    <h2>Notas</h2>
    <ul id="notes"></ul>
  </div>

  <div class="card" id="clipscard">
    <h2>Clips</h2>
    <ul id="clips"></ul>
  </div>

  <div class="card" id="songscard">
    <h2>Canciones tocadas</h2>
    <ul id="songs"></ul>
  </div>

  <footer>Compartido con Ensayo Vivo · sólo lectura</footer>
</main>

<script>
(function () {
  'use strict';

  var SUPABASE_URL = 'https://ykgbqhhnrewgmujauztt.supabase.co';
  // Ventana en la que una nota se considera "sonando" (igual que la app).
  var NOTE_WINDOW_S = 4;

  var $ = function (id) { return document.getElementById(id); };
  var audio = $('audio');
  var data = null;
  var clipEnd = null; // si hay un clip en curso, el segundo en que frenar

  function clock(s) {
    if (!isFinite(s) || s < 0) s = 0;
    var m = Math.floor(s / 60);
    var r = Math.floor(s % 60);
    return m + ':' + (r < 10 ? '0' : '') + r;
  }

  function fail(text) {
    $('msg').textContent = text;
    $('msg').hidden = false;
    $('app').hidden = true;
  }

  // El token va en el FRAGMENTO (#...), no en el query: así no viaja al
  // servidor del hosting ni queda en sus logs ni en el Referer.
  function readToken() {
    var h = (location.hash || '').replace(/^#/, '').trim();
    if (h) return h;
    // Compatibilidad: aceptar ?t= por si un link viejo lo trae así.
    var m = /[?&]t=([^&]+)/.exec(location.search);
    return m ? decodeURIComponent(m[1]) : '';
  }

  // ---------------------------------------------------------------- onda ---
  var canvas = $('wave'), ctx = canvas.getContext('2d');

  function drawWave() {
    var ratio = window.devicePixelRatio || 1;
    var w = canvas.clientWidth, h = canvas.clientHeight;
    canvas.width = w * ratio;
    canvas.height = h * ratio;
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    ctx.clearRect(0, 0, w, h);

    var peaks = (data && data.waveform) || null;
    var total = duration();
    var playedFrac = total > 0 ? audio.currentTime / total : 0;

    if (!peaks || !peaks.length) {
      // Ensayo viejo sin waveform: barra simple con el avance.
      ctx.fillStyle = '#242429';
      ctx.fillRect(0, h / 2 - 3, w, 6);
      ctx.fillStyle = '#3BA7C4';
      ctx.fillRect(0, h / 2 - 3, w * playedFrac, 6);
      return;
    }

    var n = peaks.length;
    var bw = w / n;
    var gap = bw > 3 ? 1 : 0;
    for (var i = 0; i < n; i++) {
      var amp = Math.max(0.02, Math.min(1, peaks[i]));
      var bh = amp * (h - 8);
      var x = i * bw;
      ctx.fillStyle = (i / n) <= playedFrac ? '#3BA7C4' : '#3A3A42';
      var rw = Math.max(1, bw - gap);
      var ry = (h - bh) / 2;
      // Barras con cabezas redondeadas (igual que la app).
      if (ctx.roundRect) {
        ctx.beginPath();
        ctx.roundRect(x, ry, rw, bh, rw / 2);
        ctx.fill();
      } else {
        ctx.fillRect(x, ry, rw, bh);
      }
    }
  }

  function duration() {
    if (isFinite(audio.duration) && audio.duration > 0) return audio.duration;
    return (data && data.durationSeconds) || 0;
  }

  function seekFromEvent(e) {
    var rect = canvas.getBoundingClientRect();
    var x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    var frac = Math.max(0, Math.min(1, x / rect.width));
    clipEnd = null;
    $('clipnote').textContent = '';
    audio.currentTime = frac * duration();
  }
  canvas.addEventListener('click', seekFromEvent);

  // ---------------------------------------------------------------- pins ---
  // Distancia mínima entre pins antes de agruparlos, en píxeles. Sin esto, dos
  // notas a pocos segundos se superponen y la de atrás queda intocable (peor en
  // celular). Mismo criterio que el clustering de la app.
  var PIN_MIN_PX = 22;

  function renderPins() {
    var box = $('pins');
    box.innerHTML = '';
    var total = duration();
    if (!total || !data.annotations.length) return;
    var width = box.clientWidth || 1;

    // Agrupar por cercanía: cada grupo guarda su primer segundo y cuántas notas
    // cayeron adentro.
    var groups = [];
    data.annotations.forEach(function (a) {
      var x = Math.max(0, Math.min(1, a.seconds / total)) * width;
      var last = groups[groups.length - 1];
      if (last && x - last.x < PIN_MIN_PX) {
        last.count++;
      } else {
        groups.push({ x: x, seconds: a.seconds, count: 1, text: a.text });
      }
    });

    groups.forEach(function (g) {
      var b = document.createElement('button');
      b.className = 'pin';
      b.textContent = g.count > 1 ? String(g.count) : '•';
      b.title = g.count > 1 ? g.count + ' notas' : g.text;
      b.style.left = ((g.x / width) * 100) + '%';
      // En un grupo, salta a la primera del grupo (la lista de abajo tiene todas).
      b.addEventListener('click', function () { goTo(g.seconds); });
      box.appendChild(b);
    });
  }

  function goTo(seconds) {
    clipEnd = null;
    $('clipnote').textContent = '';
    audio.currentTime = seconds;
    audio.play();
  }

  // -------------------------------------------------------------- listas ---
  function renderLists() {
    var notes = $('notes');
    if (!data.annotations.length) {
      $('notescard').querySelector('h2').insertAdjacentHTML(
        'afterend', '<p class="empty">Este ensayo todavía no tiene notas.</p>');
    }
    data.annotations.forEach(function (a, i) {
      var li = document.createElement('li');
      li.dataset.idx = i;
      li.innerHTML = '<span class="stamp"></span><span class="note"></span>';
      li.querySelector('.stamp').textContent = clock(a.seconds);
      li.querySelector('.note').textContent = a.text;
      li.addEventListener('click', function () { goTo(a.seconds); });
      notes.appendChild(li);
    });

    var clips = $('clips');
    if (!data.clips.length) {
      $('clipscard').hidden = true;
    } else {
      data.clips.forEach(function (c) {
        var li = document.createElement('li');
        li.innerHTML = '<span class="stamp"></span><span class="range"></span>';
        li.querySelector('.stamp').textContent = '▶ ' + clock(c.startSecond);
        li.querySelector('.range').textContent =
          'hasta ' + clock(c.endSecond) + ' · ' + Math.round(c.endSecond - c.startSecond) + ' s';
        li.addEventListener('click', function () { playRange(c.startSecond, c.endSecond); });
        clips.appendChild(li);
      });
    }

    var songs = $('songs');
    if (!data.songs.length) {
      $('songscard').hidden = true;
    } else {
      data.songs.forEach(function (s) {
        var li = document.createElement('li');
        li.innerHTML = '<span class="note"></span><span class="range"></span>';
        li.querySelector('.note').textContent = s.title;
        if (s.startSecond != null) {
          li.querySelector('.range').textContent =
            clock(s.startSecond) + (s.endSecond != null ? '–' + clock(s.endSecond) : '');
          li.addEventListener('click', function () { goTo(s.startSecond); });
        } else {
          li.style.cursor = 'default';
        }
        songs.appendChild(li);
      });
    }
  }

  // Reproduce sólo el tramo del clip sobre el audio del ensayo (no hay
  // archivo aparte: el clip es un rango, ver la Edge Function).
  function playRange(start, end) {
    clipEnd = end;
    $('clipnote').textContent = 'Clip ' + clock(start) + '–' + clock(end);
    audio.currentTime = start;
    audio.play();
  }

  // ------------------------------------------------------------- eventos ---
  $('play').addEventListener('click', function () {
    if (audio.paused) audio.play(); else audio.pause();
  });
  $('back').addEventListener('click', function () {
    audio.currentTime = Math.max(0, audio.currentTime - 10);
  });
  $('fwd').addEventListener('click', function () {
    audio.currentTime = Math.min(duration(), audio.currentTime + 10);
  });
  audio.addEventListener('play', function () { $('play').textContent = '⏸ Pausar'; });
  audio.addEventListener('pause', function () { $('play').textContent = '▶ Reproducir'; });

  audio.addEventListener('timeupdate', function () {
    if (clipEnd != null && audio.currentTime >= clipEnd) {
      audio.pause();
      clipEnd = null;
      $('clipnote').textContent = '';
    }
    $('cur').textContent = clock(audio.currentTime);
    drawWave();
    highlightActiveNote();
  });
  audio.addEventListener('loadedmetadata', function () {
    $('dur').textContent = clock(duration());
    drawWave();
    renderPins();
  });
  window.addEventListener('resize', function () { drawWave(); renderPins(); });

  function highlightActiveNote() {
    var t = audio.currentTime;
    var items = $('notes').children;
    for (var i = 0; i < items.length; i++) {
      var a = data.annotations[i];
      var on = t >= a.seconds && t < a.seconds + NOTE_WINDOW_S;
      items[i].classList.toggle('active', on);
    }
  }

  // --------------------------------------------------------------- carga ---
  // Si el navegador reusa la pestaña para otro link (cambia sólo el #), no se
  // dispara una carga nueva y quedaría el ensayo anterior en pantalla.
  window.addEventListener('hashchange', function () { location.reload(); });

  var token = readToken();
  if (!token) {
    fail('Falta el código del link. Pedí que te lo compartan de nuevo.');
    return;
  }

  fetch(SUPABASE_URL + '/functions/v1/share/' + encodeURIComponent(token) + '?format=json')
    .then(function (r) {
      // El cuerpo puede no ser JSON (p. ej. un error del gateway): no dejar que
      // eso caiga en el catch de red, que mostraría un mensaje equivocado.
      return r.text().then(function (t) {
        var body = null;
        try { body = JSON.parse(t); } catch (e) { body = null; }
        return { ok: r.ok, status: r.status, body: body };
      });
    })
    .then(function (res) {
      if (!res.ok || !res.body) {
        fail(
          (res.body && res.body.error) ||
          (res.status === 404 ? 'Este link no existe o fue eliminado.' :
           res.status === 410 ? 'Este link ya no está disponible.' :
           'No se pudo abrir este ensayo.')
        );
        return;
      }
      data = res.body;
      data.annotations = data.annotations || [];
      data.clips = data.clips || [];
      data.songs = data.songs || [];

      document.title = data.title + (data.band ? ' · ' + data.band : '') + ' — Ensayo Vivo';
      $('title').textContent = data.title;
      var bits = [];
      if (data.band) bits.push(data.band);
      if (data.date) bits.push(new Date(data.date + 'T00:00:00').toLocaleDateString('es-UY',
        { day: 'numeric', month: 'long', year: 'numeric' }));
      if (data.durationSeconds) bits.push(clock(data.durationSeconds));
      $('meta').textContent = bits.join(' · ');

      audio.src = data.audioUrl;
      $('dur').textContent = clock(data.durationSeconds || 0);

      renderLists();
      $('msg').hidden = true;
      $('app').hidden = false;
      drawWave();
      renderPins();
    })
    .catch(function () {
      fail('No se pudo conectar. Revisá tu internet y volvé a intentar.');
    });
})();
</script>
</body>
</html>
